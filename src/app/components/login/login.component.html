<main class="login-page">
  @if (loading) {
  <section class="login-spinner" role="status" aria-live="assertive">
    <div class="login-spinner-card">
      <img src="assets/img/logo-intranet.png" alt="Federacio de Fogueres de Sant Joan">
      <span class="login-spinner-ring" aria-hidden="true"></span>
      <strong>Validando credenciales...</strong>
    </div>
  </section>
  }

  <section class="login-card app-card">
    <img src="assets/img/logo-intranet.png" alt="Federacio de Fogueres de Sant Joan">
    <span class="login-kicker">Tickets APP 2026</span>
    <h1>Acceso a administracion</h1>
    <p>Panel privado para gestionar entradas y validar accesos.</p>

    <div class="login-form">
      <label class="app-field">
        <span>Usuario</span>
        <input type="text" id="username" [formControl]="username" autocomplete="username" (keyup.enter)="login()">
      </label>

      <label class="app-field">
        <span>Contrasena</span>
        <input type="password" id="password" [formControl]="password" autocomplete="current-password" (keyup.enter)="login()">
      </label>

      @if (error) {
      <p class="login-error">{{ error }}</p>
      }

      @if (feedback) {
      <p class="login-feedback">{{ feedback }}</p>
      }

      <button class="app-primary-button w-100" type="button" [disabled]="loading" (click)="login()">
        <i class="bi bi-box-arrow-in-right"></i>
        {{ loading ? 'Validando...' : 'Iniciar sesion' }}
      </button>
    </div>
  </section>
</main>
